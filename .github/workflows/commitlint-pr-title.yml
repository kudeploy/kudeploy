name: Commitlint PR title

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  commitlint-pr-title:
    name: Commitlint PR title
    if: github.event.action != 'edited' || contains(toJson(github.event.changes), 'title')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Commitlint PR title
        run: printf '%s\n' "$COMMITLINT_TITLE" | pnpm exec commitlint --verbose
        env:
          COMMITLINT_TITLE: ${{ github.event.pull_request.title }}
