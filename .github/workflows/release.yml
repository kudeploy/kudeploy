name: Release

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      publish_existing:
        description: Publish the current chart versions even when no release commit is generated.
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate current commit with commitlint
        if: github.event_name != 'pull_request'
        run: pnpm exec commitlint --last --verbose

      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from "$COMMITLINT_FROM" --to "$COMMITLINT_TO" --verbose
        env:
          COMMITLINT_FROM: ${{ github.event.pull_request.base.sha }}
          COMMITLINT_TO: ${{ github.event.pull_request.head.sha }}

  release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: commitlint
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm charts
        run: pnpm nx run-many -t lint --projects=helm-chart,crds-helm-chart

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Login to GHCR for Helm
        run: echo "$GITHUB_TOKEN" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release projects
        id: release
        run: |
          release_created=false
          should_publish=true
          projects_to_publish=""
          charts_to_package=""
          release_projects=""

          if [ "$PUBLISH_EXISTING" != "true" ]; then
            changed_files_for_version=""
            zero_sha="0000000000000000000000000000000000000000"

            if [ -n "${GITHUB_EVENT_BEFORE:-}" ] && [ "$GITHUB_EVENT_BEFORE" != "$zero_sha" ]; then
              changed_files_for_version="$(git diff --name-only "$GITHUB_EVENT_BEFORE" HEAD)"
            else
              changed_files_for_version="$(git diff --name-only HEAD~1 HEAD)"
            fi

            echo "Changed files considered for release versioning:"
            printf '%s\n' "$changed_files_for_version"

            version_projects=()
            add_version_project() {
              local project="$1"
              if [[ " ${version_projects[*]} " != *" $project "* ]]; then
                version_projects+=("$project")
              fi
            }

            if grep -q '^apps/controller/' <<< "$changed_files_for_version"; then
              add_version_project controller
              add_version_project helm-chart
            fi
            if grep -qE '^apps/controller/(api/|config/crd/)' <<< "$changed_files_for_version"; then
              add_version_project crds-helm-chart
              add_version_project helm-chart
            fi
            if grep -q '^apps/client/' <<< "$changed_files_for_version"; then
              add_version_project client
              add_version_project helm-chart
            fi
            if grep -q '^apps/server/' <<< "$changed_files_for_version"; then
              add_version_project server
              add_version_project helm-chart
            fi
            if grep -q '^helm-charts/kudeploy-crds/' <<< "$changed_files_for_version"; then
              add_version_project crds-helm-chart
              add_version_project helm-chart
            fi
            if grep -q '^helm-charts/kudeploy/' <<< "$changed_files_for_version"; then
              add_version_project helm-chart
            fi

            release_projects="$(IFS=,; echo "${version_projects[*]}")"
            if [ -z "$release_projects" ]; then
              echo "No release-managed project changes detected; skipping publish."
              should_publish=false
            else
              echo "Release version projects: $release_projects"
            fi
          fi

          dry_run_log="$(mktemp)"
          dry_run_status=0

          if [ "$should_publish" = "true" ]; then
            release_args=(--skip-publish)
            if [ -n "$release_projects" ]; then
              release_args+=(--projects="$release_projects")
            fi

            set +e
            pnpm exec nx release "${release_args[@]}" --dry-run > "$dry_run_log" 2>&1
            dry_run_status=$?
            set -e
            cat "$dry_run_log"
          fi

          if [ "$should_publish" = "true" ] && grep -q "No files would be changed as a result of running versioning" "$dry_run_log"; then
            if [ "$PUBLISH_EXISTING" = "true" ]; then
              echo "No release changes detected; publishing current chart versions."
              projects_to_publish="controller,client,server,crds-helm-chart,helm-chart"
              charts_to_package="crds-helm-chart,helm-chart"
            else
              echo "No release changes detected; skipping publish."
              should_publish=false
            fi
          else
            if [ "$should_publish" = "true" ] && [ "$dry_run_status" -ne 0 ]; then
              exit "$dry_run_status"
            fi

            if [ "$should_publish" = "true" ]; then
              before_release="$(git rev-parse HEAD)"
              pnpm exec nx release "${release_args[@]}"
              after_release="$(git rev-parse HEAD)"

              if [ "$after_release" = "$before_release" ]; then
                echo "No release commit was created; skipping publish."
                should_publish=false
              else
                release_created=true
                changed_files="$(git diff --name-only "$before_release" "$after_release")"
                projects=()
                charts=()
                add_project() {
                  local project="$1"
                  if [[ " ${projects[*]} " != *" $project "* ]]; then
                    projects+=("$project")
                  fi
                }
                add_chart() {
                  local chart="$1"
                  if [[ " ${charts[*]} " != *" $chart "* ]]; then
                    charts+=("$chart")
                  fi
                }
                image_tag_changed() {
                  local component="$1"
                  node - "$before_release" "$after_release" "$component" <<'NODE'
          const { execFileSync } = require('node:child_process');
          const { parse } = require('yaml');

          const [before, after, component] = process.argv.slice(2);

          function readTag(ref) {
            const source = execFileSync(
              'git',
              ['show', `${ref}:helm-charts/kudeploy/values.yaml`],
              { encoding: 'utf8' },
            );
            return String(parse(source)?.[component]?.image?.tag ?? '');
          }

          process.exit(readTag(before) === readTag(after) ? 1 : 0);
          NODE
                }

                if image_tag_changed controller; then
                  add_project controller
                fi
                if image_tag_changed client; then
                  add_project client
                fi
                if image_tag_changed server; then
                  add_project server
                fi
                if grep -q '^helm-charts/kudeploy-crds/' <<< "$changed_files"; then
                  add_project crds-helm-chart
                  add_chart crds-helm-chart
                fi
                if grep -q '^helm-charts/kudeploy/' <<< "$changed_files"; then
                  add_project helm-chart
                  add_chart helm-chart
                fi

                projects_to_publish="$(IFS=,; echo "${projects[*]}")"
                charts_to_package="$(IFS=,; echo "${charts[*]}")"
                git push --follow-tags --atomic origin main
              fi
            fi
          fi

          echo "release_created=$release_created" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "projects_to_publish=$projects_to_publish" >> "$GITHUB_OUTPUT"
          echo "charts_to_package=$charts_to_package" >> "$GITHUB_OUTPUT"
        env:
          PUBLISH_EXISTING: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_existing == true }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}

      - name: Setup QEMU
        if: steps.release.outputs.should_publish == 'true' && steps.release.outputs.projects_to_publish != ''
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        if: steps.release.outputs.should_publish == 'true' && steps.release.outputs.projects_to_publish != ''
        uses: docker/setup-buildx-action@v4

      - name: Expose GitHub Actions cache runtime
        if: steps.release.outputs.should_publish == 'true' && steps.release.outputs.projects_to_publish != ''
        uses: actions/github-script@v8
        with:
          script: |
            const names = [
              "ACTIONS_RUNTIME_TOKEN",
              "ACTIONS_RUNTIME_URL",
              "ACTIONS_CACHE_URL",
              "ACTIONS_RESULTS_URL",
              "ACTIONS_CACHE_SERVICE_V2",
            ];

            for (const name of names) {
              const value = process.env[name];
              if (!value) {
                continue;
              }

              if (name.includes("TOKEN")) {
                core.setSecret(value);
              }
              core.exportVariable(name, value);
            }

      - name: Login to GHCR for Docker
        if: steps.release.outputs.should_publish == 'true' && steps.release.outputs.projects_to_publish != ''
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm charts
        if: steps.release.outputs.should_publish == 'true' && steps.release.outputs.charts_to_package != ''
        run: pnpm nx run-many -t package --projects="${{ steps.release.outputs.charts_to_package }}"

      - name: Publish release artifacts
        if: steps.release.outputs.should_publish == 'true' && steps.release.outputs.projects_to_publish != ''
        run: pnpm exec nx release publish --yes --parallel=1 --projects="${{ steps.release.outputs.projects_to_publish }}"
