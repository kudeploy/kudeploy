name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: Publish the current app and chart versions.
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create version pull request
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          title: Version Packages
          commit: Version Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release artifacts
        id: release
        run: node scripts/detect-release-artifacts.mjs
        env:
          BASE_SHA: ${{ github.event_name == 'push' && github.event.before || github.sha }}
          FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || 'false' }}

      - name: Setup Helm
        if: >-
          steps.release.outputs.kudeploy_changed == 'true' ||
          steps.release.outputs.kudeploy_controller_changed == 'true' ||
          steps.release.outputs.kudeploy_crds_changed == 'true'
        uses: azure/setup-helm@v5

      - name: Setup QEMU
        if: steps.release.outputs.controller_changed == 'true' || steps.release.outputs.kudeploy_controller_changed == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        if: steps.release.outputs.controller_changed == 'true' || steps.release.outputs.kudeploy_controller_changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR for Docker
        if: steps.release.outputs.controller_changed == 'true' || steps.release.outputs.kudeploy_controller_changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check controller image
        id: controller_image
        if: steps.release.outputs.controller_changed == 'true' || steps.release.outputs.kudeploy_controller_changed == 'true'
        run: |
          image="ghcr.io/kudeploy/controller:${{ steps.release.outputs.controller_version }}"
          if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push controller image
        if: >-
          (steps.release.outputs.controller_changed == 'true' ||
          steps.release.outputs.kudeploy_controller_changed == 'true') &&
          steps.controller_image.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: apps/controller
          file: apps/controller/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kudeploy/controller:${{ steps.release.outputs.controller_version }}
            ghcr.io/kudeploy/controller:latest

      - name: Publish Helm OCI charts
        if: steps.release.outputs.any_changed == 'true'
        run: pnpm run publish-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_KUDEPLOY: ${{ steps.release.outputs.kudeploy_changed }}
          PUBLISH_KUDEPLOY_CONTROLLER: ${{ steps.release.outputs.kudeploy_controller_changed }}
          PUBLISH_KUDEPLOY_CRDS: ${{ steps.release.outputs.kudeploy_crds_changed }}
          FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || 'false' }}
