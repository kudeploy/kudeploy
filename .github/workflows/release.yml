name: Release

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      publish_existing:
        description: Publish the current chart versions even when no release commit is generated.
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate current commit with commitlint
        if: github.event_name != 'pull_request'
        run: pnpm exec commitlint --last --verbose

      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from "$COMMITLINT_FROM" --to "$COMMITLINT_TO" --verbose
        env:
          COMMITLINT_FROM: ${{ github.event.pull_request.base.sha }}
          COMMITLINT_TO: ${{ github.event.pull_request.head.sha }}

  release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: commitlint
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: "@kudeploy"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm charts
        run: pnpm nx run-many -t lint --projects=helm-chart,controller-helm-chart,crds-helm-chart,server-helm-chart

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Login to GHCR for Helm
        run: echo "$GITHUB_TOKEN" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release projects
        id: release
        run: |
          dry_run_log="$(mktemp)"
          set +e
          pnpm exec nx release --skip-publish --dry-run > "$dry_run_log" 2>&1
          dry_run_status=$?
          set -e
          cat "$dry_run_log"

          release_created=false
          should_publish=true
          projects_to_publish=""
          charts_to_package=""

          if grep -q "No files would be changed as a result of running versioning" "$dry_run_log"; then
            if [ "$PUBLISH_EXISTING" = "true" ]; then
              echo "No release changes detected; publishing current chart versions."
              projects_to_publish="controller,server,controller-helm-chart,crds-helm-chart,server-helm-chart,helm-chart"
              charts_to_package="controller-helm-chart,crds-helm-chart,server-helm-chart,helm-chart"
            else
              echo "No release changes detected; skipping publish."
              should_publish=false
            fi
          else
            if [ "$dry_run_status" -ne 0 ]; then
              exit "$dry_run_status"
            fi

            before_release="$(git rev-parse HEAD)"
            pnpm exec nx release --skip-publish
            after_release="$(git rev-parse HEAD)"

            if [ "$after_release" = "$before_release" ]; then
              echo "No release commit was created; skipping publish."
              should_publish=false
            else
              release_created=true
              changed_files="$(git diff --name-only "$before_release" "$after_release")"
              projects=()
              charts=()
              add_project() {
                local project="$1"
                if [[ " ${projects[*]} " != *" $project "* ]]; then
                  projects+=("$project")
                fi
              }
              add_chart() {
                local chart="$1"
                if [[ " ${charts[*]} " != *" $chart "* ]]; then
                  charts+=("$chart")
                fi
              }

              if grep -q '^helm-charts/kudeploy-controller/' <<< "$changed_files"; then
                add_project controller-helm-chart
                add_chart controller-helm-chart
              fi
              if git diff "$before_release" "$after_release" -- helm-charts/kudeploy-controller/Chart.yaml | grep -q '^[+-]appVersion:'; then
                add_project controller
              fi
              if grep -q '^packages/client-assets/' <<< "$changed_files"; then
                add_project client-assets
              fi
              if grep -q '^helm-charts/kudeploy-server/' <<< "$changed_files"; then
                add_project server-helm-chart
                add_chart server-helm-chart
              fi
              if git diff "$before_release" "$after_release" -- apps/server/package.json helm-charts/kudeploy-server/Chart.yaml | grep -q '^[+-].*\("version"\|appVersion\)'; then
                add_project server
              fi
              if grep -q '^helm-charts/kudeploy-crds/' <<< "$changed_files"; then
                add_project crds-helm-chart
                add_chart crds-helm-chart
              fi
              if grep -q '^helm-charts/kudeploy/' <<< "$changed_files"; then
                add_project helm-chart
                add_chart helm-chart
              fi

              projects_to_publish="$(IFS=,; echo "${projects[*]}")"
              charts_to_package="$(IFS=,; echo "${charts[*]}")"
              git push --follow-tags --atomic origin main
            fi
          fi

          echo "release_created=$release_created" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "projects_to_publish=$projects_to_publish" >> "$GITHUB_OUTPUT"
          echo "charts_to_package=$charts_to_package" >> "$GITHUB_OUTPUT"
        env:
          PUBLISH_EXISTING: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_existing == true }}

      - name: Setup QEMU
        if: steps.release.outputs.should_publish == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        if: steps.release.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Expose GitHub Actions cache runtime
        if: steps.release.outputs.should_publish == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const names = [
              "ACTIONS_RUNTIME_TOKEN",
              "ACTIONS_RUNTIME_URL",
              "ACTIONS_CACHE_URL",
              "ACTIONS_RESULTS_URL",
              "ACTIONS_CACHE_SERVICE_V2",
            ];

            for (const name of names) {
              const value = process.env[name];
              if (!value) {
                continue;
              }

              if (name.includes("TOKEN")) {
                core.setSecret(value);
              }
              core.exportVariable(name, value);
            }

      - name: Login to GHCR for Docker
        if: steps.release.outputs.should_publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm charts
        if: steps.release.outputs.should_publish == 'true' && steps.release.outputs.charts_to_package != ''
        run: pnpm nx run-many -t package --projects="${{ steps.release.outputs.charts_to_package }}"

      - name: Publish release artifacts
        if: steps.release.outputs.should_publish == 'true'
        run: pnpm exec nx release publish --yes --parallel=1 --projects="${{ steps.release.outputs.projects_to_publish }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
