global:
  imageRegistry: ''
  imagePullSecrets: []

nameOverride: ''
fullnameOverride: ''
namespaceOverride: ''

commonLabels: {}
commonAnnotations: {}

replicaCount: 1

image:
  registry: ghcr.io
  repository: kudeploy/client
  tag: ''
  digest: ''
  pullPolicy: IfNotPresent
  pullSecrets: []

client:
  port: 8080

service:
  enabled: true
  type: ClusterIP
  port: 80
  annotations: {}

healthProbe:
  path: /healthz
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 20
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10

serviceAccount:
  create: true
  name: ''
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ''

extraEnv: []
envFrom: []
extraVolumeMounts: []
extraVolumes: []

terminationGracePeriodSeconds: 30
