global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

commonLabels: {}
commonAnnotations: {}

replicaCount: 1

image:
  registry: ghcr.io
  repository: kudeploy/server
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

server:
  port: 4000

service:
  enabled: true
  type: ClusterIP
  port: 4000
  annotations: {}

healthProbe:
  path: /api/auth/ok
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 20
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""

extraEnv: []
envFrom: []
extraVolumeMounts: []
extraVolumes: []

terminationGracePeriodSeconds: 30
