{{- if .Values.client.enabled }}
{{- $values := .Values.client }}
{{- if $values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kudeploy.client.fullname" . }}
  namespace: {{ include "kudeploy.client.namespace" . }}
  labels:
    {{- include "kudeploy.client.labels" . | nindent 4 }}
  {{- with $values.service.annotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
spec:
  type: {{ $values.service.type }}
  ports:
    - name: http
      port: {{ $values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "kudeploy.client.selectorLabels" . | nindent 4 }}
{{- end }}

{{- end }}
