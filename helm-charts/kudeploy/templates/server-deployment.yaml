{{- if .Values.server.enabled }}
{{- $values := .Values.server }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kudeploy.server.fullname" . }}
  namespace: {{ include "kudeploy.server.namespace" . }}
  labels:
    {{- include "kudeploy.server.labels" . | nindent 4 }}
  {{- with $values.commonAnnotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ $values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kudeploy.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kudeploy.server.selectorLabels" . | nindent 8 }}
        {{- with $values.podLabels }}
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
      {{- with $values.podAnnotations }}
      annotations:
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kudeploy.server.serviceAccountName" . }}
      {{- include "common.images.renderPullSecrets" (dict "images" (list $values.image) "context" $) | nindent 6 }}
      {{- with $values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- if and $values.migration.enabled $values.migration.waitForMigrations.enabled }}
      initContainers:
        - name: wait-for-migrations
          image: {{ include "kudeploy.server.image" . | quote }}
          imagePullPolicy: {{ $values.image.pullPolicy }}
          {{- with $values.migration.waitForMigrations.command }}
          command:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          args:
            {{- if $values.migration.waitForMigrations.args }}
            {{- include "common.tplvalues.render" (dict "value" $values.migration.waitForMigrations.args "context" $) | nindent 12 }}
            {{- else }}
            - dist/scripts/wait-for-migrations.js
            - --migration-wait-timeout={{ $values.migration.waitForMigrations.timeoutSeconds }}
            {{- end }}
          env:
            {{- include "kudeploy.server.env" . | nindent 12 }}
            {{- with $values.migration.waitForMigrations.env }}
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
          {{- $serverEnvFrom := include "kudeploy.server.envFrom" . | trim }}
          {{- if or $serverEnvFrom $values.migration.waitForMigrations.envFrom }}
          envFrom:
            {{- if $serverEnvFrom }}
            {{- $serverEnvFrom | nindent 12 }}
            {{- end }}
            {{- with $values.migration.waitForMigrations.envFrom }}
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with (default $values.securityContext $values.migration.waitForMigrations.securityContext) }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $values.migration.waitForMigrations.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "kudeploy.server.image" . | quote }}
          imagePullPolicy: {{ $values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $values.port }}
              protocol: TCP
          env:
            {{- include "kudeploy.server.env" . | nindent 12 }}
          {{- $serverEnvFrom := include "kudeploy.server.envFrom" . | trim }}
          {{- if $serverEnvFrom }}
          envFrom:
            {{- $serverEnvFrom | nindent 12 }}
          {{- end }}
          {{- with $values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ $values.healthProbe.path }}
              port: {{ $values.port }}
            {{- toYaml $values.healthProbe.liveness | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ $values.healthProbe.path }}
              port: {{ $values.port }}
            {{- toYaml $values.healthProbe.readiness | nindent 12 }}
          {{- with $values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with $values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $values.terminationGracePeriodSeconds }}

{{- end }}
