{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kudeploy.fullname" . }}
  labels:
    {{- include "kudeploy.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with (default .Values.ingress.className .Values.ingress.ingressClassName) }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- if or .Values.ingress.tls .Values.ingress.extraTls }}
  tls:
    {{- if and .Values.ingress.tls .Values.ingress.hostname }}
    - hosts:
        - {{ tpl .Values.ingress.hostname $ | quote }}
      secretName: {{ printf "%s-tls" (tpl .Values.ingress.hostname $) }}
    {{- end }}
    {{- with .Values.ingress.extraTls }}
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.hostname }}
    - host: {{ tpl .Values.ingress.hostname $ | quote }}
      http:
        paths:
          {{- range .Values.ingress.server.paths }}
          - path: {{ default "/api" .path }}
            pathType: {{ default $.Values.ingress.pathType .pathType }}
            backend:
              service:
                name: {{ include "kudeploy.serverServiceName" $ }}
                port:
                  number: {{ $.Values.ingress.server.servicePort }}
          {{- end }}
          {{- range .Values.ingress.client.paths }}
          - path: {{ default "/" .path }}
            pathType: {{ default $.Values.ingress.pathType .pathType }}
            backend:
              service:
                name: {{ include "kudeploy.clientServiceName" $ }}
                port:
                  number: {{ $.Values.ingress.client.servicePort }}
          {{- end }}
    {{- end }}
    {{- range .Values.ingress.extraHosts }}
    {{- $paths := default (dict) .paths }}
    {{- $serverPaths := default $.Values.ingress.server.paths $paths.server }}
    {{- $clientPaths := default $.Values.ingress.client.paths $paths.client }}
    - host: {{ tpl .name $ | quote }}
      http:
        paths:
          {{- range $serverPaths }}
          - path: {{ default "/api" .path }}
            pathType: {{ default $.Values.ingress.pathType .pathType }}
            backend:
              service:
                name: {{ include "kudeploy.serverServiceName" $ }}
                port:
                  number: {{ $.Values.ingress.server.servicePort }}
          {{- end }}
          {{- range $clientPaths }}
          - path: {{ default "/" .path }}
            pathType: {{ default $.Values.ingress.pathType .pathType }}
            backend:
              service:
                name: {{ include "kudeploy.clientServiceName" $ }}
                port:
                  number: {{ $.Values.ingress.client.servicePort }}
          {{- end }}
    {{- end }}
    {{- with .Values.ingress.extraRules }}
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
    {{- end }}
{{- end }}
