{{- if .Values.server.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kudeploy.server.fullname" . }}
  labels:
    {{- include "kudeploy.server.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - get
      - create
  - apiGroups:
      - kudeploy.com
    resources:
      - buildruns
      - deployments
      - projects
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kudeploy.server.fullname" . }}
  labels:
    {{- include "kudeploy.server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kudeploy.server.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kudeploy.server.serviceAccountName" . }}
    namespace: {{ include "kudeploy.server.namespace" . }}

{{- end }}
