{{- if .Values.controller.enabled }}
{{- $values := .Values.controller }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kudeploy.controller.fullname" . }}
  namespace: {{ include "kudeploy.controller.namespace" . }}
  labels:
    {{- include "kudeploy.controller.labels" . | nindent 4 }}
  {{- with $values.commonAnnotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ $values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kudeploy.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kudeploy.controller.selectorLabels" . | nindent 8 }}
        {{- with $values.podLabels }}
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
      {{- with $values.podAnnotations }}
      annotations:
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kudeploy.controller.serviceAccountName" . }}
      {{- include "common.images.renderPullSecrets" (dict "images" (list $values.image) "context" $) | nindent 6 }}
      {{- with $values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "kudeploy.controller.image" . | quote }}
          imagePullPolicy: {{ $values.image.pullPolicy }}
          command:
            {{- toYaml $values.command | nindent 12 }}
          args:
            {{- if $values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address={{ $values.healthProbe.bindAddress }}
            {{- if $values.metrics.enabled }}
            - --metrics-bind-address={{ $values.metrics.bindAddress }}
            {{- else }}
            - --metrics-bind-address=0
            {{- end }}
            {{- with $values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: health
              containerPort: {{ $values.healthProbe.port }}
              protocol: TCP
            {{- if $values.metrics.enabled }}
            - name: https
              containerPort: {{ $values.metrics.port }}
              protocol: TCP
            {{- end }}
          {{- with $values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $values.healthProbe.port }}
            {{- toYaml $values.healthProbe.liveness | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ $values.healthProbe.port }}
            {{- toYaml $values.healthProbe.readiness | nindent 12 }}
          {{- with $values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with $values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $values.terminationGracePeriodSeconds }}

{{- end }}
