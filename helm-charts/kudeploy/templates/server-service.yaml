{{- if .Values.server.enabled }}
{{- $values := .Values.server }}
{{- if $values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kudeploy.server.fullname" . }}
  namespace: {{ include "kudeploy.server.namespace" . }}
  labels:
    {{- include "kudeploy.server.labels" . | nindent 4 }}
  {{- with $values.service.annotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
spec:
  type: {{ $values.service.type }}
  ports:
    - name: http
      port: {{ $values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "kudeploy.server.selectorLabels" . | nindent 4 }}
{{- end }}

{{- end }}
