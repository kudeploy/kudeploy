postgresql:
  enabled: true
  fullnameOverride: ""
  auth:
    username: kudeploy
    password: ""
    database: kudeploy
    existingSecret: ""
    existingSecretPasswordKey: postgresql-password
  initdb:
    scripts:
      00-init-database.sql: |
        do $$
        declare
          application_user text := '{{ include "postgresql.username" . | trim | replace "'" "''" }}';
        begin
          if not exists (select 1 from pg_roles where rolname = 'anonymous') then
            create role anonymous nologin;
          end if;

          if not exists (select 1 from pg_roles where rolname = 'authenticated') then
            create role authenticated nologin;
          end if;

          execute format('grant anonymous to %I', application_user);
          execute format('grant authenticated to %I', application_user);
        end
        $$;
  service:
    ports:
      postgresql: 5432
  persistence:
    enabled: true
    size: 8Gi

