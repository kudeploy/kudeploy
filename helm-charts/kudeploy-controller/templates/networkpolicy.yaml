{{- if and .Values.metrics.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kudeploy-controller.fullname" . }}-allow-metrics
  namespace: {{ include "kudeploy-controller.namespace" . }}
  labels:
    {{- include "kudeploy-controller.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kudeploy-controller.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.namespaceSelector | nindent 12 }}
      ports:
        - port: {{ .Values.metrics.port }}
          protocol: TCP
{{- end }}
