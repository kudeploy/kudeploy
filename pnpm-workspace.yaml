packages:
  - "apps/*"
overrides:
  emittery: 0.13.1
allowBuilds:
  "@apollo/protobufjs": true
  "@nestjs/core": true
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  nx: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - nx-helm
  - '@nest-boot/auth@7.11.1'
  - '@nest-boot/graphql-connection@7.9.0'
  - mikro-orm-filter-query-schema@1.3.0
