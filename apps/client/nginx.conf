log_format upstreaminfo escape=json
  '{"time": "$time_iso8601", "remote_addr": "$proxy_protocol_addr", '
  '"x_forwarded_for": "$proxy_add_x_forwarded_for", '
  '"request_id": "$request_id", "remote_user": "$remote_user", '
  '"bytes_sent": $bytes_sent, "request_time": $request_time, '
  '"status": $status, "host": "$host", '
  '"request_proto": "$server_protocol", "path": "$uri", '
  '"request_query": "$args", "request_length": $request_length, '
  '"method": "$request_method", "http_referrer": "$http_referer", '
  '"http_user_agent": "$http_user_agent" }';

server {
  listen 8080;
  server_name _;

  access_log /dev/stdout upstreaminfo;
  error_log /dev/stderr warn;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
